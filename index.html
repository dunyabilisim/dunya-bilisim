<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback} = React;


const SB_URL = "https://icwirzzhvbbxrqudgmym.supabase.co";
const SB_KEY = "sb_publishable_wbwfj5pfuAON0w-7qcDAbw_mIDNaza7";
const SBH = { "Content-Type":"application/json","apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}` };
const STORAGE_URL = `${SB_URL}/storage/v1/object`;
const STORAGE_HDR = {"apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`};

const sb = {
  async getAll(){const r=await fetch(`${SB_URL}/rest/v1/urunler?order=ekleme_tarihi.desc`,{headers:SBH});if(!r.ok)throw new Error(await r.text());return r.json();},
  async upsert(u){const r=await fetch(`${SB_URL}/rest/v1/urunler`,{method:"POST",headers:{...SBH,"Prefer":"resolution=merge-duplicates"},body:JSON.stringify({id:u.id,ad:u.ad,kategori:u.kategori,marka:u.marka,model:u.model,spec:u.spec,satis_fiyati:parseFloat(u.satisFiyati)||0,alis_fiyati:parseFloat(u.alisFiyati)||null,alt_limit:parseFloat(u.altLimit)||null,durum:u.durum,notlar:u.notlar,ekleme_tarihi:u.eklemeTarihi||new Date().toISOString(),satildi_tarihi:u.satildiTarihi||null,foto_urls:u.fotoUrls||null})});if(!r.ok)throw new Error(await r.text());},
  async delete(id){const r=await fetch(`${SB_URL}/rest/v1/urunler?id=eq.${id}`,{method:"DELETE",headers:SBH});if(!r.ok)throw new Error(await r.text());},
  async patch(id,fields){const r=await fetch(`${SB_URL}/rest/v1/urunler?id=eq.${id}`,{method:"PATCH",headers:SBH,body:JSON.stringify(fields)});if(!r.ok)throw new Error(await r.text());},
  async fotoYukle(urunId,base64,index){
    const blob=await(await fetch(`data:image/jpeg;base64,${base64}`)).blob();
    const path=`${urunId}/${index}_${Date.now()}.jpg`;
    const r=await fetch(`${STORAGE_URL}/urun-fotograflar/${path}`,{method:"POST",headers:{...STORAGE_HDR,"Content-Type":"image/jpeg","x-upsert":"true"},body:blob});
    if(!r.ok)throw new Error(await r.text());
    return `${SB_URL}/storage/v1/object/public/urun-fotograflar/${path}`;
  },
  async fotoSil(path){
    const r=await fetch(`${SB_URL}/storage/v1/object/urun-fotograflar/${path}`,{method:"DELETE",headers:STORAGE_HDR});
    return r.ok;
  },
};

function rowToUrun(row) {
  return {
    id:row.id, ad:row.ad||"", kategori:row.kategori||"Diğer",
    marka:row.marka||"", model:row.model||"", spec:row.spec||"",
    satisFiyati:row.satis_fiyati?.toString()||"",
    alisFiyati:row.alis_fiyati?.toString()||"",
    altLimit:row.alt_limit?.toString()||"",
    durum:row.durum||"mevcut", notlar:row.notlar||"",
    eklemeTarihi:row.ekleme_tarihi, satildiTarihi:row.satildi_tarihi,
    fotoUrls: row.foto_urls ? (Array.isArray(row.foto_urls)?row.foto_urls:JSON.parse(row.foto_urls)) : [],
  };
}

async function callClaude(messages, apiKey, system="", retries=2) {
  if (!apiKey) throw new Error("API key girilmedi — Ayarlar sekmesine gidin");
  const body = {model:"claude-haiku-4-5-20251001",max_tokens:1500,messages};
  if (system) body.system = system;
  for (let i=0; i<=retries; i++) {
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key":apiKey,
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true"
        },
        body:JSON.stringify(body),
      });
      if (!r.ok) {
        const txt = await r.text();
        throw new Error(`HTTP ${r.status}: ${txt.slice(0,200)}`);
      }
      const d = await r.json();
      if (d.error) throw new Error(d.error.message);
      return d.content?.[0]?.text||"";
    } catch(e) {
      if (i===retries) throw e;
      await new Promise(res=>setTimeout(res,1000*(i+1)));
    }
  }
}

const KATEGORILER = ["GPU","CPU","RAM","Anakart","SSD/HDD","PSU","Kasa","Laptop","Komple Sistem","Aksesuar","Diğer"];
const DURUMLAR = {
  mevcut:  {label:"Mevcut",       color:"#22c55e",bg:"rgba(34,197,94,.15)",  dot:"#22c55e"},
  rezerve: {label:"Rezerve",      color:"#f59e0b",bg:"rgba(245,158,11,.15)", dot:"#f59e0b"},
  satildi: {label:"Satıldı",      color:"#ef4444",bg:"rgba(239,68,68,.15)",  dot:"#ef4444"},
  ilansiz: {label:"İlanda Değil", color:"#818cf8",bg:"rgba(129,140,248,.15)",dot:"#818cf8"},
  parca:   {label:"Arızalı/Parça",color:"#94a3b8",bg:"rgba(148,163,184,.15)",dot:"#94a3b8"},
};
const KAT_IKON = {"GPU":"🎮","CPU":"⚡","RAM":"💾","Anakart":"🔌","SSD/HDD":"💿","PSU":"🔋","Kasa":"📦","Laptop":"💻","Komple Sistem":"🖥️","Aksesuar":"🔧","Diğer":"📋"};

const FORM_BOS = {id:null,ad:"",kategori:"GPU",marka:"",model:"",spec:"",satisFiyati:"",alisFiyati:"",altLimit:"",durum:"mevcut",notlar:""};

function App() {
  const [urunler,setUrunler]         = useState([]);
  const [yukleniyor,setYukleniyor]   = useState(true);
  const [dbDurum,setDbDurum]         = useState("baglaniyor");
  const [aktifSayfa,setAktifSayfa]   = useState("dashboard");
  const [aktifUrun,setAktifUrun]     = useState(null);
  const [ilanMetni,setIlanMetni]     = useState(null);
  const [uretiliyor,setUretiliyor]   = useState(false);
  const [filtre,setFiltre]           = useState({durum:"hepsi",kategori:"hepsi",arama:""});
  const [apiKey,setApiKey] = useState("");
  const [apiKeyYuklendi,setApiKeyYuklendi] = useState(false);

  // API key'i Supabase'den çek
  useEffect(()=>{
    (async()=>{
      try{
        const r=await fetch(`${SB_URL}/rest/v1/ayarlar?anahtar=eq.claude_api_key&select=deger`,{headers:SBH});
        if(r.ok){const d=await r.json();if(d[0]?.deger){setApiKey(d[0].deger);}}
      }catch(e){console.warn("API key çekilemedi:",e);}
      finally{setApiKeyYuklendi(true);}
    })();
  },[]);

  const apiKeySave = async(key)=>{
    setApiKey(key);
    try{await fetch(`${SB_URL}/rest/v1/ayarlar?anahtar=eq.claude_api_key`,{method:"PATCH",headers:SBH,body:JSON.stringify({deger:key})});}
    catch(e){toast$("❌ Key kaydedilemedi","err");}
  };
  const [girisModal,setGirisModal]   = useState(false);
  const [editForm,setEditForm]       = useState(null);
  const [toast,setToast]             = useState({msg:"",tip:""});
  const [hg,setHg] = useState({adim:"secim",veri:{},alis:"",satisFiyati:"",durum:"mevcut",notlar:"",metin:"",foto:null,ekstraFotolar:[],yukleniyor:false});
  const [kocAktifTab,setKocAktifTab] = useState("saglik");
  const [psw,setPsw] = useState({adim:"giris",sistemAdi:"",sistemSpec:"",alisFiyati:"",envanterSecim:"",parcalar:[],sonuc:null,yukleniyor:false,kayitYukleniyor:false});
  const pswSet = (patch) => setPsw(p=>({...p,...patch}));
  const [waKarti,setWaKarti] = useState(null); // {urun, yukleniyor}
  const [iletisim,setIletisim] = useState(()=>JSON.parse(localStorage.getItem("db_iletisim")||'{"isim":"Dünya Bilişim","tel":"","ig":"","adres":""}'));
  const [galeriUrun,setGaleriUrun] = useState(null); // foto galeri modal
  const [galeriIndex,setGaleriIndex] = useState(0);

  const [mobil,setMobil] = useState(window.innerWidth<=900);
  useEffect(()=>{
    const fn=()=>setMobil(window.innerWidth<=900);
    window.addEventListener("resize",fn);
    return()=>window.removeEventListener("resize",fn);
  },[]);

  const toast$ = (msg,tip="info") => { setToast({msg,tip}); setTimeout(()=>setToast({msg:"",tip:""}),3500); };

  const veriYukle = useCallback(async()=>{
    setYukleniyor(true);
    try { const rows=await sb.getAll(); setUrunler(rows.map(rowToUrun)); setDbDurum("ok"); }
    catch { setDbDurum("hata"); }
    finally { setYukleniyor(false); }
  },[]);

  useEffect(()=>{veriYukle();},[veriYukle]);

  const hgSet = (patch) => setHg(p=>({...p,...patch}));
  const hgSifirla = () => { setHg({adim:"secim",veri:{},alis:"",satisFiyati:"",durum:"mevcut",notlar:"",metin:"",foto:null,ekstraFotolar:[],yukleniyor:false}); setGirisModal(false); };

  const aiTani = async(deger) => {
    hgSet({yukleniyor:true,adim:"tani"});
    try {
      const sys=`Sen bilişim ürünü uzmanısın. Verilen bilgiden ürün bilgilerini çıkar ve SADECE JSON döndür.\nJSON: {"ad":"","kategori":"GPU|CPU|RAM|Anakart|SSD/HDD|PSU|Kasa|Laptop|Komple Sistem|Aksesuar|Diğer","marka":"","model":"","spec":""}`;
      const messages=[{role:"user",content:`Şu bilgiden ürün JSON'ı çıkar:\n${deger}`}];
      const yanit=await callClaude(messages,apiKey,sys);
      const veri=JSON.parse(yanit.replace(/```json|```/g,"").trim());
      hgSet({veri,adim:"onay",yukleniyor:false});
    } catch(e) { toast$("❌ Tanıma hatası: "+e.message,"err"); hgSet({adim:"secim",yukleniyor:false}); }
  };

  const hgKaydet = async() => {
    if(!hg.veri.ad||!hg.satisFiyati){ toast$("⚠️ Ürün adı ve satış fiyatı zorunlu","warn"); return; }
    hgSet({yukleniyor:true});
    try {
      const urunId = Date.now().toString();
      // Fotoları yükle
      const fotoUrls = [];
      const tumFotolar = [hg.foto, ...hg.ekstraFotolar].filter(Boolean);
      for(let i=0;i<tumFotolar.length;i++){
        try { const url=await sb.fotoYukle(urunId,tumFotolar[i],i); fotoUrls.push(url); }
        catch(e){ console.warn("Foto yüklenemedi:",e.message); }
      }
      const urun={id:urunId,ad:hg.veri.ad,kategori:hg.veri.kategori||"Diğer",marka:hg.veri.marka||"",model:hg.veri.model||"",spec:hg.veri.spec||"",satisFiyati:hg.satisFiyati,alisFiyati:hg.alis,altLimit:"",durum:hg.durum,notlar:hg.notlar,eklemeTarihi:new Date().toISOString(),fotoUrls};
      await sb.upsert(urun);
      setUrunler(p=>[urun,...p]);
      hgSifirla();
      toast$(`✅ Ürün eklendi${fotoUrls.length>0?` (${fotoUrls.length} foto)`:""}`,"ok");
    } catch(e) { toast$("❌ "+e.message,"err"); hgSet({yukleniyor:false}); }
  };

  const durumGuncelle = async(id,durum) => {
    const satildi_tarihi=durum==="satildi"?new Date().toISOString():null;
    try { await sb.patch(id,{durum,satildi_tarihi}); setUrunler(p=>p.map(u=>u.id===id?{...u,durum,satildiTarihi:satildi_tarihi}:u)); toast$(`🔄 ${DURUMLAR[durum].label}`,"ok"); }
    catch(e) { toast$("❌ "+e.message,"err"); }
  };

  const urunSil = async(id) => {
    try { await sb.delete(id); setUrunler(p=>p.filter(u=>u.id!==id)); setAktifUrun(null); toast$("🗑️ Silindi","ok"); }
    catch(e) { toast$("❌ "+e.message,"err"); }
  };

  const editKaydet = async() => {
    if(!editForm.ad||!editForm.satisFiyati){ toast$("⚠️ Ad ve fiyat zorunlu","warn"); return; }
    try { await sb.upsert(editForm); setUrunler(p=>p.map(u=>u.id===editForm.id?editForm:u)); setEditForm(null); toast$("✅ Güncellendi","ok"); }
    catch(e) { toast$("❌ "+e.message,"err"); }
  };

  const ilanUret = useCallback(async(urun)=>{
    if(!apiKey){ toast$("⚠️ API key girilmedi","warn"); return; }
    setUretiliyor(true); setIlanMetni(null);
    try {
      const prompt=`Sen "Dünya Bilişim" firmasının satış asistanısın. Şu ürün için 4 platform ilan metni yaz:\nÜrün: ${urun.ad} ${urun.marka} ${urun.model}\nSpec: ${urun.spec}\nFiyat: ${urun.satisFiyati} TL\n\n=== SAHİBİNDEN ===\n(150-200 kelime, resmi dil)\n\n=== LETGO ===\n(50-80 kelime, samimi)\n\n=== WOOCOMMERCE ===\n(SEO başlığı + 100-150 kelime)\n\n=== WHATSAPP ===\n(2-3 cümle, emoji)`;
      const yanit=await callClaude([{role:"user",content:prompt}],apiKey);
      const sections={};
      ["SAHİBİNDEN","LETGO","WOOCOMMERCE","WHATSAPP"].forEach((p,i,arr)=>{
        const s=yanit.indexOf(`=== ${p} ===`); const e=i<arr.length-1?yanit.indexOf(`=== ${arr[i+1]} ===`):yanit.length;
        if(s!==-1) sections[p]=yanit.slice(s+p.length+8,e).trim();
      });
      setIlanMetni(sections);
    } catch(e) { toast$("❌ "+e.message,"err"); }
    finally { setUretiliyor(false); }
  },[apiKey]);

  // Fotoğraf sıkıştır (canvas ile)
  const gorselSikistir=(file)=>new Promise((res,rej)=>{
    const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{
      const MAX=1200; let {width,height}=img;
      if(width>MAX||height>MAX){if(width>height){height=Math.round(height*MAX/width);width=MAX;}else{width=Math.round(width*MAX/height);height=MAX;}}
      const c=document.createElement("canvas"); c.width=width; c.height=height;
      c.getContext("2d").drawImage(img,0,0,width,height);
      res(c.toDataURL("image/jpeg",0.75).split(",")[1]);
      URL.revokeObjectURL(url);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);rej(new Error("Görsel okunamadı"));};
    img.src=url;
  });

  const fotoSec=(e,ekstra=false)=>{
    const files=Array.from(e.target.files||[]);
    if(!files.length) return;
    Promise.all(files.map(gorselSikistir)).then(base64Arr=>{
      if(ekstra){
        hgSet({ekstraFotolar:[...hg.ekstraFotolar,...base64Arr].slice(0,4)});
      } else {
        hgSet({foto:base64Arr[0],ekstraFotolar:base64Arr.slice(1,4),adim:"foto_onay"});
      }
    }).catch(e=>toast$("❌ "+e.message,"err"));
  };

  // WhatsApp Kartı — Canvas ile görsel üret
  const waKartOlustur=async(urun)=>{
    setWaKarti({urun,yukleniyor:true});
    await new Promise(r=>setTimeout(r,100));
    try {
      const W=800,H=520;
      const c=document.createElement("canvas"); c.width=W; c.height=H;
      const ctx=c.getContext("2d");
      // Arka plan
      ctx.fillStyle="#0a1120"; ctx.fillRect(0,0,W,H);
      // Sol foto alanı
      const fotoX=24,fotoY=24,fotoW=280,fotoH=280;
      ctx.fillStyle="#1e2d4a"; ctx.roundRect(fotoX,fotoY,fotoW,fotoH,12); ctx.fill();
      // Foto varsa yükle
      const urls=urun.fotoUrls||[];
      if(urls[0]){
        try{
          const img=await new Promise((res,rej)=>{const i=new Image();i.crossOrigin="anonymous";i.onload=()=>res(i);i.onerror=rej;i.src=urls[0];});
          // cover fit
          const ar=img.width/img.height; const fAr=fotoW/fotoH;
          let sx=0,sy=0,sw=img.width,sh=img.height;
          if(ar>fAr){sw=img.height*fAr;sx=(img.width-sw)/2;}else{sh=img.width/fAr;sy=(img.height-sh)/2;}
          ctx.save(); ctx.beginPath(); ctx.roundRect(fotoX,fotoY,fotoW,fotoH,12); ctx.clip();
          ctx.drawImage(img,sx,sy,sw,sh,fotoX,fotoY,fotoW,fotoH);
          ctx.restore();
        }catch(_){}
      } else {
        ctx.fillStyle="#4a6180"; ctx.font="48px serif"; ctx.textAlign="center";
        ctx.fillText(KAT_IKON[urun.kategori]||"📋",fotoX+fotoW/2,fotoY+fotoH/2+18);
      }
      // Mini foto grid (sağ altında)
      if(urls.length>1){
        const miniSize=62,gap=6,startX=fotoX,startY=fotoY+fotoH+gap;
        for(let i=1;i<Math.min(urls.length,4);i++){
          const mx=startX+(i-1)*(miniSize+gap);
          try{
            const img=await new Promise((res,rej)=>{const im=new Image();im.crossOrigin="anonymous";im.onload=()=>res(im);im.onerror=rej;im.src=urls[i];});
            ctx.save(); ctx.beginPath(); ctx.roundRect(mx,startY,miniSize,miniSize,6); ctx.clip();
            ctx.drawImage(img,mx,startY,miniSize,miniSize); ctx.restore();
          }catch(_){ctx.fillStyle="#1e2d4a";ctx.beginPath();ctx.roundRect(mx,startY,miniSize,miniSize,6);ctx.fill();}
        }
      }
      // Sağ içerik alanı
      const tx=332;
      // Kategori badge
      ctx.fillStyle="rgba(99,102,241,.25)"; ctx.beginPath(); ctx.roundRect(tx,28,120,26,13); ctx.fill();
      ctx.fillStyle="#818cf8"; ctx.font="bold 13px monospace"; ctx.textAlign="left";
      ctx.fillText(`${KAT_IKON[urun.kategori]||""} ${urun.kategori}`,tx+12,46);
      // Ürün adı
      ctx.fillStyle="#f0f4f8"; ctx.font="bold 26px monospace";
      const adWords=urun.ad.split(" ");
      let satir=""; const satirlar=[];
      for(const w of adWords){if(ctx.measureText(satir+w).width>420){satirlar.push(satir.trim());satir="";}satir+=w+" ";}
      satirlar.push(satir.trim());
      satirlar.slice(0,2).forEach((s,i)=>ctx.fillText(s,tx,82+i*30));
      // Marka/Model
      if(urun.marka||urun.model){ctx.fillStyle="#64748b";ctx.font="14px monospace";ctx.fillText(`${urun.marka} ${urun.model}`.trim(),tx,satir.length>0?148:128);}
      // Spec (max 3 satır)
      if(urun.spec){
        ctx.fillStyle="#94a3b8"; ctx.font="13px monospace";
        const specSatirlar=urun.spec.split(/[,\n]/).map(s=>s.trim()).filter(Boolean).slice(0,4);
        specSatirlar.forEach((s,i)=>{ctx.fillText(`• ${s}`,tx,178+i*20);});
      }
      // Separator
      ctx.strokeStyle="#1e2d4a"; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(tx,290); ctx.lineTo(W-24,290); ctx.stroke();
      // Fiyat
      ctx.fillStyle="#22c55e"; ctx.font="bold 32px monospace";
      ctx.fillText(`${parseFloat(urun.satisFiyati||0).toLocaleString("tr-TR")} ₺`,tx,330);
      ctx.fillStyle="#4a6180"; ctx.font="12px monospace";
      ctx.fillText("SATIŞ FİYATI",tx,348);
      // Durum badge

function IlanBlok({platform,metin}) {
  const [kop,setKop]=useState(false);
  const renkler={"SAHİBİNDEN":"#f59e0b","LETGO":"#818cf8","WOOCOMMERCE":"#c084fc","WHATSAPP":"#22c55e"};
  const ikonlar={"SAHİBİNDEN":"🏠","LETGO":"📱","WOOCOMMERCE":"🛒","WHATSAPP":"💬"};
  const r=renkler[platform]||"#64748b";
  return (
    <div style={{border:`1px solid ${r}33`,borderRadius:8,overflow:"hidden",background:"rgba(0,0,0,.2)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 12px",borderBottom:`1px solid ${r}22`,background:`${r}11`}}>
        <span style={{fontSize:12,fontWeight:600,color:r}}>{ikonlar[platform]} {platform}</span>
        <button style={{background:`${r}22`,color:r,border:"none",padding:"3px 10px",borderRadius:4,cursor:"pointer",fontSize:11,fontWeight:600}}
          onClick={()=>{navigator.clipboard.writeText(metin);setKop(true);setTimeout(()=>setKop(false),2000);}}>
          {kop?"✓ Kopyalandı":"Kopyala"}
        </button>
      </div>
      <pre style={{padding:12,fontSize:11,color:"#94a3b8",whiteSpace:"pre-wrap",wordBreak:"break-word",margin:0,lineHeight:1.6}}>{metin}</pre>
    </div>
  );
}
