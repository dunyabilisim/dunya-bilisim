<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback} = React;


const SB_URL = "https://icwirzzhvbbxrqudgmym.supabase.co";
const SB_KEY = "sb_publishable_wbwfj5pfuAON0w-7qcDAbw_mIDNaza7";
const SBH = { "Content-Type":"application/json","apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}` };

const sb = {
  async getAll() {
    const r = await fetch(`${SB_URL}/rest/v1/urunler?order=ekleme_tarihi.desc`, { headers: SBH });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async upsert(u) {
    const r = await fetch(`${SB_URL}/rest/v1/urunler`, {
      method:"POST",
      headers:{...SBH,"Prefer":"resolution=merge-duplicates"},
      body:JSON.stringify({
        id:u.id, ad:u.ad, kategori:u.kategori, marka:u.marka, model:u.model,
        spec:u.spec, satis_fiyati:parseFloat(u.satisFiyati)||0,
        alis_fiyati:parseFloat(u.alisFiyati)||null, alt_limit:parseFloat(u.altLimit)||null,
        durum:u.durum, notlar:u.notlar,
        ekleme_tarihi:u.eklemeTarihi||new Date().toISOString(),
        satildi_tarihi:u.satildiTarihi||null,
      }),
    });
    if (!r.ok) throw new Error(await r.text());
  },
  async delete(id) {
    const r = await fetch(`${SB_URL}/rest/v1/urunler?id=eq.${id}`,{method:"DELETE",headers:SBH});
    if (!r.ok) throw new Error(await r.text());
  },
  async patch(id, fields) {
    const r = await fetch(`${SB_URL}/rest/v1/urunler?id=eq.${id}`,{method:"PATCH",headers:SBH,body:JSON.stringify(fields)});
    if (!r.ok) throw new Error(await r.text());
  },
};

function rowToUrun(row) {
  return {
    id:row.id, ad:row.ad||"", kategori:row.kategori||"Diğer",
    marka:row.marka||"", model:row.model||"", spec:row.spec||"",
    satisFiyati:row.satis_fiyati?.toString()||"",
    alisFiyati:row.alis_fiyati?.toString()||"",
    altLimit:row.alt_limit?.toString()||"",
    durum:row.durum||"mevcut", notlar:row.notlar||"",
    eklemeTarihi:row.ekleme_tarihi, satildiTarihi:row.satildi_tarihi,
  };
}

async function callClaude(messages, apiKey, system="", retries=2) {
  if (!apiKey) throw new Error("API key girilmedi — Ayarlar sekmesine gidin");
  const body = {model:"claude-haiku-4-5-20251001",max_tokens:1500,messages};
  if (system) body.system = system;
  for (let i=0; i<=retries; i++) {
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key":apiKey,
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true"
        },
        body:JSON.stringify(body),
      });
      if (!r.ok) {
        const txt = await r.text();
        throw new Error(`HTTP ${r.status}: ${txt.slice(0,200)}`);
      }
      const d = await r.json();
      if (d.error) throw new Error(d.error.message);
      return d.content?.[0]?.text||"";
    } catch(e) {
      if (i===retries) throw e;
      await new Promise(res=>setTimeout(res,1000*(i+1)));
    }
  }
}

const KATEGORILER = ["GPU","CPU","RAM","Anakart","SSD/HDD","PSU","Kasa","Laptop","Komple Sistem","Aksesuar","Diğer"];
const DURUMLAR = {
  mevcut:  {label:"Mevcut",       color:"#22c55e",bg:"rgba(34,197,94,.15)",  dot:"#22c55e"},
  rezerve: {label:"Rezerve",      color:"#f59e0b",bg:"rgba(245,158,11,.15)", dot:"#f59e0b"},
  satildi: {label:"Satıldı",      color:"#ef4444",bg:"rgba(239,68,68,.15)",  dot:"#ef4444"},
  ilansiz: {label:"İlanda Değil", color:"#818cf8",bg:"rgba(129,140,248,.15)",dot:"#818cf8"},
  parca:   {label:"Arızalı/Parça",color:"#94a3b8",bg:"rgba(148,163,184,.15)",dot:"#94a3b8"},
};
const KAT_IKON = {"GPU":"🎮","CPU":"⚡","RAM":"💾","Anakart":"🔌","SSD/HDD":"💿","PSU":"🔋","Kasa":"📦","Laptop":"💻","Komple Sistem":"🖥️","Aksesuar":"🔧","Diğer":"📋"};

const FORM_BOS = {id:null,ad:"",kategori:"GPU",marka:"",model:"",spec:"",satisFiyati:"",alisFiyati:"",altLimit:"",durum:"mevcut",notlar:""};

function App() {
  const [urunler,setUrunler]         = useState([]);
  const [yukleniyor,setYukleniyor]   = useState(true);
  const [dbDurum,setDbDurum]         = useState("baglaniyor");
  const [aktifSayfa,setAktifSayfa]   = useState("dashboard");
  const [aktifUrun,setAktifUrun]     = useState(null);
  const [ilanMetni,setIlanMetni]     = useState(null);
  const [uretiliyor,setUretiliyor]   = useState(false);
  const [filtre,setFiltre]           = useState({durum:"hepsi",kategori:"hepsi",arama:""});
  const [apiKey,setApiKey]           = useState(localStorage.getItem("db_api_key")||"");
  const [girisModal,setGirisModal]   = useState(false);
  const [editForm,setEditForm]       = useState(null);
  const [toast,setToast]             = useState({msg:"",tip:""});
  const [hg,setHg]                   = useState({adim:"secim",veri:{},alis:"",durum:"mevcut",notlar:"",fiyatlar:null,secFiyat:null,metin:"",foto:null,yukleniyor:false});
  const [kocAktifTab,setKocAktifTab] = useState("saglik");
  const [pazarlikUrun,setPazarlikUrun]   = useState(null);
  const [pazarlikTeklif,setPazarlikTeklif] = useState("");
  const [pazarlikYanit,setPazarlikYanit]   = useState("");
  const [pazarlikYukleniyor,setPazarlikYukleniyor] = useState(false);
  const [psw,setPsw] = useState({adim:"giris",sistemAdi:"",sistemSpec:"",alisFiyati:"",envanterSecim:"",parcalar:[],sonuc:null,yukleniyor:false,kayitYukleniyor:false});
  const pswSet = (patch) => setPsw(p=>({...p,...patch}));

  const [mobil,setMobil] = useState(window.innerWidth<=900);
  useEffect(()=>{
    const fn=()=>setMobil(window.innerWidth<=900);
    window.addEventListener("resize",fn);
    return()=>window.removeEventListener("resize",fn);
  },[]);

  const toast$ = (msg,tip="info") => { setToast({msg,tip}); setTimeout(()=>setToast({msg:"",tip:""}),3500); };

  const veriYukle = useCallback(async()=>{
    setYukleniyor(true);
    try { const rows=await sb.getAll(); setUrunler(rows.map(rowToUrun)); setDbDurum("ok"); }
    catch { setDbDurum("hata"); }
    finally { setYukleniyor(false); }
  },[]);

  useEffect(()=>{veriYukle();},[veriYukle]);

  const hgSet = (patch) => setHg(p=>({...p,...patch}));
  const hgSifirla = () => { setHg({adim:"secim",veri:{},alis:"",durum:"mevcut",notlar:"",fiyatlar:null,secFiyat:null,metin:"",foto:null,yukleniyor:false}); setGirisModal(false); };

  const aiTani = async(kaynak,deger) => {
    hgSet({yukleniyor:true,adim:"tani"});
    try {
      const sys=`Sen bilişim ürünü uzmanısın. Verilen bilgiden ürün bilgilerini çıkar ve SADECE JSON döndür.
JSON: {"ad":"","kategori":"GPU|CPU|RAM|Anakart|SSD/HDD|PSU|Kasa|Laptop|Komple Sistem|Aksesuar|Diğer","marka":"","model":"","spec":""}`;
      let messages;
      if(kaynak==="foto") messages=[{role:"user",content:[{type:"image",source:{type:"base64",media_type:"image/jpeg",data:deger}},{type:"text",text:"Bu bilişim ürününün bilgilerini JSON olarak çıkar."}]}];
      else messages=[{role:"user",content:`Şu bilgiden ürün JSON'ı çıkar:\n${deger}`}];
      const yanit=await callClaude(messages,apiKey,sys);
      const veri=JSON.parse(yanit.replace(/```json|```/g,"").trim());
      hgSet({veri,adim:"onay",yukleniyor:false});
    } catch(e) { toast$("❌ Tanıma hatası: "+e.message,"err"); hgSet({adim:"secim",yukleniyor:false}); }
  };

  const aiFiyat = async() => {
    if(!hg.alis){ toast$("⚠️ Alış fiyatı girin","warn"); return; }
    hgSet({yukleniyor:true,adim:"fiyat"});
    try {
      const alis = parseFloat(hg.alis);
      const sys=`Sen Türkiye sahibinden.com ve letgo 2.el bilişim piyasası uzmanısın.
Görevin: Gerçekçi Türk Lirası satış fiyatı önermek.

KURALLI:
- Fiyatlar MUTLAKA Türk Lirası (TL) cinsinden olacak
- Alış fiyatından YÜKSEK olacak (kâr sağlanacak)
- Sahibinden.com güncel 2.el piyasasını baz al
- GPU için tipik kâr marjı %15-40, CPU %10-25, RAM %10-20, Laptop %10-30
- Hızlı fiyat: alış * 1.10 ile 1.15 arası
- Normal fiyat: alış * 1.20 ile 1.35 arası  
- Sabır fiyatı: alış * 1.35 ile 1.50 arası
- Fiyatlar 50 TL'nin katı olsun (psikolojik fiyatlandırma)
- SADECE JSON döndür, başka hiçbir şey yazma

JSON formatı: {"hizli":0,"normal":0,"sabir":0,"aciklama":""}`;

      const prompt=`Ürün: ${hg.veri.ad}
Marka/Model: ${hg.veri.marka} ${hg.veri.model}
Kategori: ${hg.veri.kategori}
Spec: ${hg.veri.spec}
Alış fiyatım: ${alis} TL

Bu ürün için Türkiye sahibinden.com 2.el piyasasında gerçekçi 3 farklı satış fiyatı öner.
Fiyatlar ${alis} TL'nin üzerinde OLMAK ZORUNDA. Minimum %10 kâr marjı şart.
aciklama alanına 1 cümlelik kısa piyasa notu yaz (Türkçe).`;

      const yanit=await callClaude([{role:"user",content:prompt}],apiKey,sys);
      const clean=yanit.replace(/```json|```/g,"").trim();
      const json=clean.substring(clean.indexOf("{"),clean.lastIndexOf("}")+1);
      const fiyatlar=JSON.parse(json);
      
      // Güvenlik: alıştan düşükse otomatik düzelt
      const duzelt=(f,min)=>Math.max(f,min);
      const minH=Math.round(alis*1.10/50)*50;
      const minN=Math.round(alis*1.20/50)*50;
      const minS=Math.round(alis*1.35/50)*50;
      fiyatlar.hizli=duzelt(fiyatlar.hizli,minH);
      fiyatlar.normal=duzelt(fiyatlar.normal,minN);
      fiyatlar.sabir=duzelt(fiyatlar.sabir,minS);
      
      hgSet({fiyatlar,secFiyat:fiyatlar.normal.toString(),yukleniyor:false});
    } catch(e) { toast$("❌ Fiyat hatası: "+e.message,"err"); hgSet({adim:"onay",yukleniyor:false}); }
  };

  const hgKaydet = async() => {
    if(!hg.veri.ad||!hg.secFiyat){ toast$("⚠️ Bilgiler eksik","warn"); return; }
    const urun={id:Date.now().toString(),ad:hg.veri.ad,kategori:hg.veri.kategori||"Diğer",marka:hg.veri.marka||"",model:hg.veri.model||"",spec:hg.veri.spec||"",satisFiyati:hg.secFiyat,alisFiyati:hg.alis,altLimit:"",durum:hg.durum,notlar:hg.notlar,eklemeTarihi:new Date().toISOString()};
    try { await sb.upsert(urun); setUrunler(p=>[urun,...p]); hgSifirla(); toast$("✅ Ürün eklendi","ok"); }
    catch(e) { toast$("❌ "+e.message,"err"); }
  };

  const durumGuncelle = async(id,durum) => {
    const satildi_tarihi=durum==="satildi"?new Date().toISOString():null;
    try { await sb.patch(id,{durum,satildi_tarihi}); setUrunler(p=>p.map(u=>u.id===id?{...u,durum,satildiTarihi:satildi_tarihi}:u)); toast$(`🔄 ${DURUMLAR[durum].label}`,"ok"); }
    catch(e) { toast$("❌ "+e.message,"err"); }
  };

  const urunSil = async(id) => {
    try { await sb.delete(id); setUrunler(p=>p.filter(u=>u.id!==id)); setAktifUrun(null); toast$("🗑️ Silindi","ok"); }
    catch(e) { toast$("❌ "+e.message,"err"); }
  };

  const editKaydet = async() => {
    if(!editForm.ad||!editForm.satisFiyati){ toast$("⚠️ Ad ve fiyat zorunlu","warn"); return; }
    try { await sb.upsert(editForm); setUrunler(p=>p.map(u=>u.id===editForm.id?editForm:u)); setEditForm(null); toast$("✅ Güncellendi","ok"); }
    catch(e) { toast$("❌ "+e.message,"err"); }
  };

  const ilanUret = useCallback(async(urun)=>{
    if(!apiKey){ toast$("⚠️ API key girilmedi","warn"); return; }
    setUretiliyor(true); setIlanMetni(null);
    try {
      const prompt=`Sen "Dünya Bilişim" firmasının satış asistanısın. Şu ürün için 4 platform ilan metni yaz:\nÜrün: ${urun.ad} ${urun.marka} ${urun.model}\nSpec: ${urun.spec}\nFiyat: ${urun.satisFiyati} TL\n\n=== SAHİBİNDEN ===\n(150-200 kelime, resmi dil)\n\n=== LETGO ===\n(50-80 kelime, samimi)\n\n=== WOOCOMMERCE ===\n(SEO başlığı + 100-150 kelime)\n\n=== WHATSAPP ===\n(2-3 cümle, emoji)`;
      const yanit=await callClaude([{role:"user",content:prompt}],apiKey);
      const sections={};
      ["SAHİBİNDEN","LETGO","WOOCOMMERCE","WHATSAPP"].forEach((p,i,arr)=>{
        const s=yanit.indexOf(`=== ${p} ===`); const e=i<arr.length-1?yanit.indexOf(`=== ${arr[i+1]} ===`):yanit.length;
        if(s!==-1) sections[p]=yanit.slice(s+p.length+8,e).trim();
      });
      setIlanMetni(sections);
    } catch(e) { toast$("❌ "+e.message,"err"); }
    finally { setUretiliyor(false); }
  },[apiKey]);

  const fotoSec=(e)=>{ const file=e.target.files?.[0]; if(!file) return; const reader=new FileReader(); reader.onload=(ev)=>{ hgSet({foto:ev.target.result.split(",")[1],adim:"foto_onay"}); }; reader.readAsDataURL(file); };

  const filtrelenmis=urunler.filter(u=>{
    if(filtre.durum!=="hepsi"&&u.durum!==filtre.durum) return false;
    if(filtre.kategori!=="hepsi"&&u.kategori!==filtre.kategori) return false;
    if(filtre.arama&&!`${u.ad} ${u.marka} ${u.model}`.toLowerCase().includes(filtre.arama.toLowerCase())) return false;
    return true;
  });

  const stats={
    toplam:urunler.length,
    mevcut:urunler.filter(u=>u.durum==="mevcut").length,
    satildi:urunler.filter(u=>u.durum==="satildi").length,
    rezerve:urunler.filter(u=>u.durum==="rezerve").length,
    stok:urunler.filter(u=>u.durum!=="satildi").reduce((s,u)=>s+(parseFloat(u.satisFiyati)||0),0),
    gelir:urunler.filter(u=>u.durum==="satildi").reduce((s,u)=>s+(parseFloat(u.satisFiyati)||0),0),
    kar:urunler.filter(u=>u.durum==="satildi"&&u.alisFiyati).reduce((s,u)=>s+(parseFloat(u.satisFiyati)-parseFloat(u.alisFiyati)),0),
  };

  const parcalamaAnaliz = async() => {
    if(!apiKey){toast$("⚠️ API key gerekli","warn");return;}
    const sistemBilgi = psw.envanterSecim
      ? urunler.find(u=>u.id===psw.envanterSecim)
      : {ad:psw.sistemAdi, spec:psw.sistemSpec, alisFiyati:psw.alisFiyati, kategori:"Komple Sistem"};
    if(!sistemBilgi?.ad){toast$("⚠️ Sistem bilgisi eksik","warn");return;}
    pswSet({yukleniyor:true, adim:"analiz"});
    try {
      const sys = `Sen Türkiye 2.el bilişim piyasası uzmanısın. Verilen komple sistemi analiz et ve parçalama kararı ver. SADECE JSON döndür, başka hiçbir şey yazma.`;
      const prompt = `Sistem: ${sistemBilgi.ad} ${sistemBilgi.spec||""}
Alış Fiyatı: ${sistemBilgi.alisFiyati||psw.alisFiyati||"bilinmiyor"} TL

Türkiye sahibinden.com 2.el piyasasına göre:
1. Her parça için gerçekçi satış fiyatı tahmin et
2. Tahmini satış süresini ver
3. Zorluk seviyesini belirt (Kolay/Orta/Zor)
4. Genel tavsiye ver

JSON formatı (başka hiçbir şey yazma):
{
  "komple": {"fiyat": 0, "suresi": "X gün", "zorluk": "Kolay|Orta|Zor", "aciklama": ""},
  "parcalar": [
    {"ad": "", "kategori": "GPU|CPU|RAM|Anakart|SSD/HDD|PSU|Kasa|Aksesuar|Diğer", "marka": "", "model": "", "tahmini_fiyat": 0, "satis_suresi": "X gün", "zorluk": "Kolay|Orta|Zor"}
  ],
  "toplam_parca_gelir": 0,
  "kar_farki": 0,
  "tavsiye": "PARCALA|KOMPLE",
  "tavsiye_aciklama": "",
  "riskler": ""
}`;
      const yanit = await callClaude([{role:"user",content:prompt}],apiKey,sys);
      const clean = yanit.replace(/```json|```/g,"").trim();

      pswSet({sonuc, adim:"sonuc", yukleniyor:false});
    } catch(e) {
      toast$("❌ Analiz hatası: "+e.message,"err");
      pswSet({yukleniyor:false, adim:"giris"});
    }
  };

  const parcalariKaydet = async() => {
    if(!psw.sonuc?.parcalar?.length) return;
    pswSet({kayitYukleniyor:true});
    try {
      const yeniParcalar = psw.sonuc.parcalar.map(p=>({
        id: Date.now().toString()+Math.random().toString(36).slice(2,6),
        ad: p.ad, kategori: p.kategori||"Diğer", marka: p.marka||"", model: p.model||"",
        spec: "", satisFiyati: p.tahmini_fiyat?.toString()||"0",
        alisFiyati: "", altLimit: "", durum: "mevcut",
        notlar: `Parçalama sihirbazından eklendi. Tahmini satış: ${p.satis_suresi}`,
        eklemeTarihi: new Date().toISOString(),
      }));
      for(const p of yeniParcalar) await sb.upsert(p);
      // Komple sistemi satıldı olarak işaretle
      if(psw.envanterSecim) await sb.patch(psw.envanterSecim,{durum:"parca"});
      setUrunler(prev=>{
        const guncellenmis = psw.envanterSecim
          ? prev.map(u=>u.id===psw.envanterSecim?{...u,durum:"parca"}:u)
          : prev;
        return [...yeniParcalar,...guncellenmis];
      });
      toast$(`✅ ${yeniParcalar.length} parça envantere eklendi`,"ok");

    if(gun>60) skor-=40; else if(gun>30) skor-=20; else if(gun>14) skor-=8;
    if(karMarji!==null){ if(karMarji<5) skor-=25; else if(karMarji<10) skor-=10; else if(karMarji>35) skor+=10; }

Müşteri teklifi: ${teklif} TL

Görevin:
1. Bu teklifi değerlendir (kabul et / karşı teklif yap / reddet)
2. Müşteriye yazacağım WhatsApp mesaj metnini yaz
3. Müşteri psikolojisini kısaca analiz et

Yanıtı şu formatta ver:
KARAR: [KABUL / KARŞI_TEKLİF / RET]
KARŞI_FİYAT: [Önereceğin fiyat, yoksa boş]
WHATSAPP_METIN: [Müşteriye gönderilecek mesaj — samimi, emoji kullan]
PSİKOLOJİ: [1 cümle analiz]`;
      const yanit=await callClaude([{role:"user",content:prompt}],apiKey);

  const r=renkler[platform]||"#64748b";
  return (
    <div style={{border:`1px solid ${r}33`,borderRadius:8,overflow:"hidden",background:"rgba(0,0,0,.2)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 12px",borderBottom:`1px solid ${r}22`,background:`${r}11`}}>
        <span style={{fontSize:12,fontWeight:600,color:r}}>{ikonlar[platform]} {platform}</span>
        <button style={{background:`${r}22`,color:r,border:"none",padding:"3px 10px",borderRadius:4,cursor:"pointer",fontSize:11,fontWeight:600}}
          onClick={()=>{navigator.clipboard.writeText(metin);setKop(true);setTimeout(()=>setKop(false),2000);}}>
          {kop?"✓ Kopyalandı":"Kopyala"}
        </button>
      </div>
      <pre style={{padding:12,fontSize:11,color:"#94a3b8",whiteSpace:"pre-wrap",wordBreak:"break-word",margin:0,lineHeight:1.6}}>{metin}</pre>
    </div>
  );
}
